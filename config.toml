# ZeroDPI configuration file
# All fields have sensible defaults and can be customized.
# Field names are UPPER_CASE; values follow TOML syntax.

# ---------------------------------------------------------------------------
# Proxy Listener
# ---------------------------------------------------------------------------

# IP address the local TCP proxy listens on.
# Use "0.0.0.0" to accept connections from all interfaces,
# or "127.0.0.1" to restrict to the local machine only.
LISTEN_HOST = "127.0.0.1"

# TCP port the local proxy listens on.
# Point your upstream VPN app (xray-core, sing-box, v2ray, etc.) here
# instead of pointing it directly at your VPN server.
LISTEN_PORT = 44444

# ---------------------------------------------------------------------------
# Operating Mode
# ---------------------------------------------------------------------------

# Operating mode. Valid values: "sni_spoof" (default), "ip_bypass",
# "sni_scan", "ip_scan", "proxy_scan".
# - "sni_spoof"  — DPI bypass via SNI spoofing (default).
# - "ip_bypass"  — plain TCP relay through a scanned IP; no packet interception.
# - "sni_scan"   — scan sni_list.txt and display/save results, then exit.
# - "ip_scan"    — scan ip_list.txt and display/save results, then exit.
# - "proxy_scan" — scan sni_list.txt (Phase 1), then test each working SNI
#                  through your V2RayN SOCKS5 mixed port (Phase 2); display
#                  blended results and exit.  Requires V2RayN to be running.
MODE = "sni_spoof"

# When true, ZeroDPI automatically picks the highest-ranked candidate
# after scanning instead of showing the manual selection table.
# TUI progress, results, and dashboard views are still shown.
# For systemd/headless runs, use the CLI flag: --no-tui.
AUTO_SELECT = false

# If set to a hostname, skip the scan entirely and use this hostname as the spoofed SNI.
# The IP address is resolved from DNS automatically.
# Leave as an empty string ("") to use the scanner.
SELECTED_SNI = ""

# If set to a valid IP, skip the IP scan entirely and use this IP directly.
# Leave as an empty string ("") to use the IP scanner.
SELECTED_IP = ""

# ---------------------------------------------------------------------------
# Input Files
# ---------------------------------------------------------------------------

# Path to the file that lists candidate SNI hostnames, one per line.
# Default: "sni_list.txt" (next to config.toml).
SNI_LIST = "sni_list.txt"

# Path to the IP list file (ip_bypass mode only).
# One entry per line: plain IPs (IPv4 or IPv6) or CIDR ranges.
# Default: "ip_list.txt".
IP_LIST = "ip_list.txt"

# ---------------------------------------------------------------------------
# Scan Behavior
# ---------------------------------------------------------------------------

# Maximum time (in seconds) each individual probe may take before
# it is abandoned.
SCAN_TIMEOUT_SECS = 5

# How often (in seconds) ZeroDPI re-runs the full SNI scan in the background
# while the proxy is running. In sni_spoof mode, a better top result switches
# the active SNI/IP for new connections. Set to 0 to disable periodic rescanning.
RESCAN_INTERVAL_SECS = 0

# Minimum score required before a background SNI rescan can switch the active
# SNI/IP target.
SNI_SWITCH_MIN_SCORE = 1

# Optional path to write scan results as a JSON file after a scan-only
# run (MODE = "sni_scan" or "ip_scan").
# Leave as an empty string ("") to disable saving.
SCAN_OUTPUT = ""

# ---------------------------------------------------------------------------
# Scanner Tuning
# ---------------------------------------------------------------------------

# Maximum concurrent SNI probes.
SNI_MAX_CONCURRENT = 64

# Maximum concurrent TCP connections in IP phase 1.
IP_MAX_P1_CONCURRENT = 128

# Maximum concurrent TLS probes in IP phase 2.
IP_MAX_P2_CONCURRENT = 32

# Maximum bytes downloaded for speed tests.
SCAN_DOWNLOAD_CAP = 10240

# SNI hostname used *only* during the TLS phase of the IP scan.
IP_SCAN_SNI = "cloudflare.com"

# Maximum number of host addresses expanded from a single IPv6 CIDR block.
IPV6_MAX_HOSTS = 65536

# ---------------------------------------------------------------------------
# Scoring Parameters
# ---------------------------------------------------------------------------

# Maximum valid TCP latency for scoring (ms).
TCP_LATENCY_CAP_MS = 500.0

# Maximum valid TLS latency for scoring (ms).
TLS_LATENCY_CAP_MS = 1000.0

# Maximum valid Time-To-First-Byte for scoring (ms).
TTFB_CAP_MS = 2000.0

# Download speed cap for scoring (bytes/sec).
SPEED_CAP_BPS = 2048000.0

# ---------------------------------------------------------------------------
# Bypass Engine
# ---------------------------------------------------------------------------

# Bypass method to use for SNI-spoof mode.
#
# Supported values:
#
#   "wrong_seq" (default)
#     Waits for the first outbound TCP ACK after the SYN/SYN-ACK exchange,
#     then injects a fake TLS ClientHello on that packet with a deliberately
#     old TCP sequence number.  DPI devices inspect the payload using the
#     allowed SNI; the real upstream server treats the segment as old/duplicate
#     and discards its payload, so the real TLS handshake proceeds unaffected.
#
#   "wrong_checksum"
#     Waits for the first outbound TCP ACK after the SYN/SYN-ACK exchange,
#     then injects a fake TLS ClientHello on that packet with the normal valid
#     TCP sequence number and ACK number.  ZeroDPI computes normal IPv4/TCP
#     checksums first, then deliberately corrupts the TCP checksum.  DPI
#     devices can inspect the payload using the allowed SNI, while the real
#     upstream server drops the invalid-checksum segment before consuming data.
#
#   "tls_record_frag"
#     Does NOT inject any fake packet.  Instead, it intercepts the first
#     outbound data packet carrying the real TLS ClientHello and re-wraps its
#     payload as multiple small TLS record fragments.  DPI engines that cannot
#     reassemble TLS records across fragment boundaries will fail to extract
#     the SNI.  The upstream TLS server reassembles the fragments normally.
#
#   "wrong_seq_tls_frag"
#     Combines both stages for layered filtering.  First, it injects a fake
#     wrong-sequence ClientHello on the handshake ACK.  Then it intercepts the
#     real first ClientHello and re-wraps it as TLS record fragments, so later
#     DPI layers still do not see an unfragmented SNI even if the fake packet
#     was dropped by an earlier firewall.
#
#   "tcp_segmentation"
#     Does NOT inject fake packets and does NOT use WinDivert or NFQUEUE
#     packet interception.  Instead, it reads the real TLS ClientHello from
#     the client socket and writes it to the upstream server socket in tiny
#     TCP segments (controlled by TCP_SEG_SIZE).  With TCP_NODELAY enabled,
#     the OS sends each chunk as a separate TCP segment so no single packet
#     carries the full SNI.  The upstream server reassembles the stream
#     normally and sees an identical ClientHello.
#
# This setting is only used by modes that perform packet interception
# ("sni_spoof", "sni_scan", and "proxy_scan").  The "ip_bypass" and
# "ip_scan" modes do not use a bypass method.
BYPASS_METHOD = "wrong_seq"

# Seconds the proxy waits for the intercept thread to confirm that the spoofed
# packet was acknowledged and the bypass phase completed.
#
# Increase this on very high-latency links or slow systems if otherwise valid
# connections time out during startup.  Lower values fail faster when the
# bypass cannot complete.  Must be at least 1.
BYPASS_TIMEOUT_SECS = 2

# Maximum lifetime (in seconds) for an established relay before ZeroDPI closes
# it and lets the upstream VPN client reconnect. This is useful for protocols
# such as gRPC that keep one TCP/TLS connection open for hours; reconnecting
# lets new connections use the latest scanned SNI/IP target.
#
# Set to 0 to disable relay rotation. This is the default.
RELAY_MAX_LIFETIME_SECS = 0

# (Linux only) NFQUEUE queue number used to intercept packets via iptables.
#
# ZeroDPI installs iptables rules that send selected TCP packets to this queue.
# If you change this value, the queue number in the installed rules must match.
# Windows builds use WinDivert instead, so this setting has no effect there.
NFQUEUE_NUM = 1

# ---------------------------------------------------------------------------
# wrong_seq method parameters
# ---------------------------------------------------------------------------
# These settings apply when BYPASS_METHOD = "wrong_seq" or
# "wrong_seq_tls_frag".

# Extra bytes subtracted from the injected TCP sequence number in addition to
# the spoofed ClientHello payload length.
#
# The default formula is:
#   injected_seq = syn_seq + 1 - payload_len - WRONG_SEQ_EXTRA_OFFSET
#
# With the default value of 0, the fake segment is placed exactly one payload
# length behind the server's expected receive sequence.  A positive value pushes
# the fake segment farther behind the receive window, which can help on some
# networks with stricter TCP window checks.  Start with 0 and only increase it
# when testing shows the default is not effective.
WRONG_SEQ_EXTRA_OFFSET = 0

# Whether to set the TCP PSH flag on the spoofed ClientHello packet.
#
# Keep this enabled for normal use.  Many DPI implementations treat PSH-marked
# packets as application data that should be inspected immediately.  Disable it
# only when testing a network or middlebox that reacts poorly to PSH.
WRONG_SEQ_SET_PSH = true

# Whether to increment the IPv4 Identification field on the spoofed packet.
#
# Bumping the ID makes the injected packet look like a fresh IPv4 datagram
# rather than a retransmission of a previous packet.  This helps some stateful
# middleboxes accept and inspect the fake ClientHello.  This only affects IPv4
# packets; IPv6 has no IPv4 Identification field.
WRONG_SEQ_BUMP_IP_IDENT = true

# ---------------------------------------------------------------------------
# wrong_checksum method parameters
# ---------------------------------------------------------------------------
# These settings only apply when BYPASS_METHOD = "wrong_checksum".

# Non-zero value added to the valid computed TCP checksum on the spoofed
# ClientHello packet.
#
# ZeroDPI first rebuilds the packet with correct IPv4/TCP checksums, then
# corrupts the TCP checksum by wrapping-addition with this value.  DPI engines
# that do not verify TCP checksums can still parse the fake ClientHello, while
# the real upstream server should silently drop it.
#
# Must be >= 1.  Default: 1.
WRONG_CHECKSUM_DELTA = 1

# Whether to set the TCP PSH flag on the spoofed ClientHello packet.
#
# Keep this enabled for normal use.  Disable it only when testing a network or
# middlebox that reacts poorly to PSH.
WRONG_CHECKSUM_SET_PSH = true

# Whether to increment the IPv4 Identification field on the spoofed packet.
#
# Bumping the ID makes the spoofed packet look like a fresh IPv4 datagram.
# This only affects IPv4 packets; IPv6 has no IPv4 Identification field.
WRONG_CHECKSUM_BUMP_IP_IDENT = true

# Whether to signal the bypass phase complete immediately after the corrupted
# packet is emitted.
#
# The default is true because a correctly invalid-checksum packet should be
# dropped silently by the real server and therefore will not produce an ACK.
WRONG_CHECKSUM_COMPLETE_IMMEDIATELY = true

# ---------------------------------------------------------------------------
# tls_record_frag method parameters
# ---------------------------------------------------------------------------
# These settings apply when BYPASS_METHOD = "tls_record_frag" or
# "wrong_seq_tls_frag".

# Maximum number of payload bytes placed in each TLS record fragment.
#
# The real TLS ClientHello payload is split into chunks of at most this many
# bytes.  Each chunk is wrapped in its own 5-byte TLS record header and the
# results are concatenated into a single TCP segment.  The upstream server
# reassembles the records into an identical ClientHello.
#
# Smaller values produce more fragments and are harder for DPI to reassemble:
#   1  — one byte per record (most aggressive, maximum fragmentation)
#   5  — one TLS record header length per record
#   128 — moderate fragmentation, balances effectiveness and overhead
#
# Must be >= 1.  Default: 1.
TLS_RECORD_FRAG_SIZE = 1

# Whether to set the TCP PSH flag on the packet carrying the fragmented
# ClientHello.
#
# PSH signals to the receiver that it should pass the data to the application
# immediately.  Keep this enabled for normal use.  Disable it only when
# debugging a specific DPI device that reacts poorly to PSH-marked packets.
TLS_RECORD_FRAG_SET_PSH = true

# Whether to increment the IPv4 Identification field on the packet carrying
# the fragmented ClientHello.
#
# Bumping the ID makes the modified packet look like a fresh IPv4 datagram
# rather than a retransmission.  This only affects IPv4 packets; IPv6 has
# no IPv4 Identification field.
TLS_RECORD_FRAG_BUMP_IP_IDENT = true

# ---------------------------------------------------------------------------
# tcp_segmentation method parameters
# ---------------------------------------------------------------------------
# These settings only apply when BYPASS_METHOD = "tcp_segmentation".
#
# Unlike "wrong_seq" and "tls_record_frag", this method does NOT use the
# WinDivert / NFQUEUE packet interceptor.  It operates entirely inside the
# proxy by making controlled writes to the upstream TCP socket.

# Maximum payload bytes sent in each TCP segment of the split ClientHello.
#
# The real TLS ClientHello is sliced into chunks of at most this many bytes.
# Each chunk is written to the upstream socket individually.  With
# TCP_SEG_NODELAY = true the OS sends each chunk as a separate TCP segment,
# so no single packet carries the full SNI.
#
# Smaller values produce more segments and are harder for DPI to reassemble,
# at the cost of slightly higher connection-setup overhead:
#   1   — one byte per segment (most aggressive, maximum fragmentation)
#   10  — ten bytes per segment
#   128 — moderate fragmentation
#
# Must be >= 1.  Default: 1.
TCP_SEG_SIZE = 1

# Whether to set TCP_NODELAY on the upstream socket before writing the
# segmented ClientHello.
#
# TCP_NODELAY disables Nagle's algorithm, which would otherwise accumulate
# small writes into a single large TCP segment and completely defeat this
# bypass method.  Keep this enabled for normal use.
#
# Set to false only when debugging a specific network or middlebox that
# reacts poorly to TCP_NODELAY connections.
TCP_SEG_NODELAY = true

# ---------------------------------------------------------------------------
# Proxy Scan Mode
# ---------------------------------------------------------------------------
# These settings only apply when MODE = "proxy_scan".
# proxy_scan first runs the standard SNI scan (Phase 1) then tests each
# passing candidate end-to-end through your VPN proxy (Phase 2).

# Minimum SNI-scan score (0–100) a candidate must reach in Phase 1 to
# be eligible for the proxy test in Phase 2.
# Default: 1 (any candidate that scored any points proceeds).
PROXY_TEST_MIN_SNI_SCORE = 1

# Maximum number of Phase 1 candidates to carry into Phase 2.
# 0 = no cap (test all passing candidates).
# Default: 0.
PROXY_TEST_TOP_N = 0

# Host of the SOCKS5 mixed proxy (V2RayN default).
PROXY_TEST_SOCKS5_HOST = "127.0.0.1"

# Port of the SOCKS5 mixed proxy (V2RayN default).
PROXY_TEST_SOCKS5_PORT = 10808

# HTTPS URL to fetch through the proxy for speed / latency measurement.
# Must be an HTTPS URL.  The Cloudflare speed endpoint below downloads a
# fixed ~512 KB chunk — ideal for measuring real-world VPN throughput.
PROXY_TEST_URL = "https://speed.cloudflare.com/__down?bytes=524288"

# Timeout for each individual proxy test probe (seconds).
# Increase on very slow or high-latency VPN links.
PROXY_TEST_TIMEOUT_SECS = 30

# Weight (0.0–1.0) given to the Phase 1 SNI-scan score when computing the
# blended final score.  The proxy-test score weight = 1.0 - this value.
# 0.5 = equal blend; 1.0 = SNI score only; 0.0 = proxy score only.
PROXY_TEST_SNI_WEIGHT = 0.5

# Scoring caps for the Phase 2 proxy test.
# These mirror SCAN_* caps but apply to the proxy-measured values.

# TCP latency cap to the SOCKS5 proxy (ms).  Latency above this → 0 pts.
PROXY_TEST_LATENCY_CAP_MS = 500.0

# TTFB cap through the proxy (ms).  TTFB above this → 0 pts.
PROXY_TEST_TTFB_CAP_MS = 3000.0

# Download speed cap through the proxy (bytes/sec).  Speed above this → max pts.
PROXY_TEST_SPEED_CAP_BPS = 2048000.0
